services:
  worker:
    build: .
    network_mode: host
    environment:
      BPM_URL: ${BPM_URL}
      BPM_USER: ${BPM_USER}
      BPM_PASS: ${BPM_PASS}
      KRB5_REALM: ${KRB5_REALM}
      KRB5_KDC: ${KRB5_KDC:-}
      http_proxy: ""
      https_proxy: ""
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      no_proxy: "*"
      NO_PROXY: "*"
    volumes:
      - session_cache:/app/session_cache

volumes:
  session_cache:
