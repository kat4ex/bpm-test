services:
  worker:
    build:
      context: .
      args:
        http_proxy: ""
        https_proxy: ""
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
    environment:
      BPM_URL: ${BPM_URL}
      BPM_USER: ${BPM_USER}
      BPM_PASS: ${BPM_PASS}
    volumes:
      - session_cache:/app/session_cache

volumes:
  session_cache:
