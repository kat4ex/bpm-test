services:
  worker:
    build:
      context: .
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
    network_mode: host
    environment:
      BPM_URL: ${BPM_URL}
      BPM_USER: ${BPM_USER}
      BPM_PASS: ${BPM_PASS}
      KRB5_REALM: ${KRB5_REALM}
      KRB5_KDC: ${KRB5_KDC:-}
    volumes:
      - session_cache:/app/session_cache

volumes:
  session_cache:
